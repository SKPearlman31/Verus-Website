name: Update Player Stats

on:
  push:
    branches: [main]
    paths:
      - 'js/roster-data.js'
      - 'data/players.json'
      - 'images/players/**'
      - '.github/workflows/update-stats.yml'
  schedule:
    - cron: '0 10 * * *'   # 5 AM EST (UTC-5) — NBA + College + Intl via ESPN
    - cron: '0 11 * * *'   # 6 AM EST (UTC-5) — G-League via stats.nba.com
  workflow_dispatch:
    inputs:
      updater:
        description: 'Which updater to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - nba
          - gleague
          - deploy-only

jobs:
  update-nba:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.updater == 'nba' || inputs.updater == 'both') ||
      github.event_name == 'schedule' && github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run NBA stats updater (ESPN)
        env:
          VERUS_SITE_URL: ${{ secrets.VERUS_SITE_URL }}
          VERUS_STATS_API_KEY: ${{ secrets.VERUS_STATS_API_KEY }}
        run: python3 update_nba_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json js/roster-data.js images/players/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update NBA stats $(date -u +%Y-%m-%d)"
            git push
          fi

  update-gleague:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.updater == 'gleague' || inputs.updater == 'both') ||
      github.event_name == 'schedule' && github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run G-League stats updater
        env:
          VERUS_SITE_URL: ${{ secrets.VERUS_SITE_URL }}
          VERUS_STATS_API_KEY: ${{ secrets.VERUS_STATS_API_KEY }}
        run: python3 update_gleague_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase  # in case NBA job pushed first
          git add data/players.json js/roster-data.js images/players/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update G-League stats $(date -u +%Y-%m-%d)"
            git push
          fi

  # ── Deploy to WordPress via REST API ─────────────────────────────────────
  deploy-to-wordpress:
    needs: [update-nba, update-gleague]
    if: |
      always() &&
      (needs.update-nba.result == 'success' || needs.update-nba.result == 'skipped') &&
      (needs.update-gleague.result == 'success' || needs.update-gleague.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Push roster data to WordPress
        env:
          VERUS_SITE_URL: ${{ secrets.VERUS_SITE_URL }}
          VERUS_STATS_API_KEY: ${{ secrets.VERUS_STATS_API_KEY }}
        run: |
          if [ -z "$VERUS_SITE_URL" ] || [ -z "$VERUS_STATS_API_KEY" ]; then
            echo "⚠ VERUS_SITE_URL or VERUS_STATS_API_KEY not set — skipping deploy"
            exit 0
          fi
          ENDPOINT="${VERUS_SITE_URL%/}/wp-json/verus/v1/update-stats"
          echo "Pushing roster data to $ENDPOINT ..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "X-Verus-Key: $VERUS_STATS_API_KEY" \
            -d @data/players.json)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ WordPress updated successfully (HTTP $HTTP_CODE)"
          else
            echo "⚠ WordPress push failed (HTTP $HTTP_CODE) — non-fatal"
          fi
