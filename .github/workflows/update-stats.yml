name: Update Player Stats

on:
  schedule:
    - cron: '0 12 * * *'  # 7 AM EST (UTC-5) = 12:00 UTC
  workflow_dispatch:       # Allow manual runs from GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install nba_api

      - name: Run stats updater
        env:
          VERUS_SITE_URL: ${{ secrets.VERUS_SITE_URL }}
          VERUS_STATS_API_KEY: ${{ secrets.VERUS_STATS_API_KEY }}
        run: python3 update_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json js/roster-data.js images/players/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update player stats $(date -u +%Y-%m-%d)"
            git push
          fi
