name: Update Player Stats

on:
  push:
    branches: [main]
    paths:
      - 'js/roster-data.js'
      - 'data/players.json'
      - 'images/players/**'
  schedule:
    - cron: '0 10 * * *'   # 5 AM EST (UTC-5) — NBA + College + Intl via ESPN
    - cron: '0 11 * * *'   # 6 AM EST (UTC-5) — G-League via stats.nba.com
  workflow_dispatch:
    inputs:
      updater:
        description: 'Which updater to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - nba
          - gleague

jobs:
  update-nba:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.updater == 'nba' || inputs.updater == 'both') ||
      github.event_name == 'schedule' && github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run NBA stats updater (ESPN)
        env:
          VERUS_SITE_URL: ${{ secrets.VERUS_SITE_URL }}
          VERUS_STATS_API_KEY: ${{ secrets.VERUS_STATS_API_KEY }}
        run: python3 update_nba_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json js/roster-data.js images/players/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update NBA stats $(date -u +%Y-%m-%d)"
            git push
          fi

  update-gleague:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.updater == 'gleague' || inputs.updater == 'both') ||
      github.event_name == 'schedule' && github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run G-League stats updater
        env:
          VERUS_SITE_URL: ${{ secrets.VERUS_SITE_URL }}
          VERUS_STATS_API_KEY: ${{ secrets.VERUS_STATS_API_KEY }}
        run: python3 update_gleague_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase  # in case NBA job pushed first
          git add data/players.json js/roster-data.js images/players/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update G-League stats $(date -u +%Y-%m-%d)"
            git push
          fi

  # ── Deploy to WordPress via FTP ──────────────────────────────────────────
  deploy-to-wordpress:
    needs: [update-nba, update-gleague]
    if: |
      always() &&
      (needs.update-nba.result == 'success' || needs.update-nba.result == 'skipped') &&
      (needs.update-gleague.result == 'success' || needs.update-gleague.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.VERUS_FTP_HOST }}
      FTP_USER: ${{ secrets.VERUS_FTP_USER }}
      FTP_PASS: ${{ secrets.VERUS_FTP_PASS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Check FTP credentials
        id: ftp-check
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠ FTP credentials not set — skipping WordPress deploy"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✓ FTP credentials found — deploying to WordPress"
          fi

      - name: Deploy roster data to WordPress
        if: steps.ftp-check.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.VERUS_FTP_HOST }}
          username: ${{ secrets.VERUS_FTP_USER }}
          password: ${{ secrets.VERUS_FTP_PASS }}
          local-dir: ./js/
          server-dir: /public_html/wp-content/themes/flavor starter/verus/js/

      - name: Deploy player images to WordPress
        if: steps.ftp-check.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.VERUS_FTP_HOST }}
          username: ${{ secrets.VERUS_FTP_USER }}
          password: ${{ secrets.VERUS_FTP_PASS }}
          local-dir: ./images/players/
          server-dir: /public_html/wp-content/themes/flavor starter/verus/images/players/
